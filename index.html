<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cocapn Vessel Room Navigator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #eee; user-select: none; }
  
  #canvas-container { width: 100vw; height: 100vh; display: block; }
  
  /* HUD overlay */
  #hud {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }
  #hud > * { pointer-events: auto; }
  
  #room-title {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.75); padding: 10px 24px; border-radius: 8px;
    font-size: 20px; font-weight: 700; letter-spacing: 1px;
    border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(8px);
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  
  /* Compass rose */
  #compass {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; background: rgba(0,0,0,0.7); 
    padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(4px);
  }
  #compass button {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: #ccc; padding: 6px 12px; border-radius: 4px; cursor: pointer;
    font-size: 11px; font-weight: 600; transition: all 0.15s;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  #compass button:hover { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.4); }
  #compass button.active { background: rgba(100,180,255,0.3); border-color: #64b4ff; color: #64b4ff; }
  
  /* Side panel */
  #side-panel {
    position: fixed; right: 0; top: 0; height: 100%; width: 280px;
    background: rgba(10,10,26,0.92); backdrop-filter: blur(12px);
    border-left: 1px solid rgba(255,255,255,0.1);
    padding: 80px 16px 16px; overflow-y: auto; transition: transform 0.3s;
    transform: translateX(0);
  }
  #side-panel.hidden { transform: translateX(100%); }
  
  #toggle-panel {
    position: fixed; right: 8px; top: 16px; z-index: 20;
    background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.15);
    color: #ccc; padding: 6px 10px; border-radius: 4px; cursor: pointer;
    font-size: 18px;
  }
  #toggle-panel:hover { background: rgba(255,255,255,0.15); }
  
  .panel-section { margin-bottom: 16px; }
  .panel-section h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 8px; }
  
  .room-link {
    display: inline-block; padding: 6px 12px; margin: 3px; border-radius: 4px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: #aad0ff; cursor: pointer; font-size: 12px; font-weight: 600;
    transition: all 0.15s;
  }
  .room-link:hover { background: rgba(100,180,255,0.2); border-color: #64b4ff; }
  .room-link.warp { background: rgba(255,200,0,0.1); border-color: rgba(255,200,0,0.3); color: #ffd54f; }
  .room-link.warp:hover { background: rgba(255,200,0,0.2); }
  
  .cam-entry {
    padding: 8px; margin: 4px 0; border-radius: 4px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
    font-size: 12px;
  }
  .cam-entry .label { color: #64b4ff; font-weight: 600; }
  .cam-entry .mode { color: #888; display: block; font-size: 10px; margin-top: 2px; }
  
  /* Camera viewports */
  .cam-viewport {
    position: fixed; border-radius: 8px; overflow: hidden;
    background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(4px); z-index: 5;
    display: none; flex-direction: column;
  }
  .cam-viewport.visible { display: flex; }
  .cam-viewport .header { padding: 4px 8px; font-size: 10px; color: #888; background: rgba(0,0,0,0.5); }
  .cam-viewport .feed {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: repeating-linear-gradient(
      45deg, #111, #111 10px, #1a1a1a 10px, #1a1a1a 20px
    );
    color: #444; font-size: 13px; min-height: 80px;
  }
  .cam-viewport .feed .cam-name { color: #555; }
  
  .viewport-tl { top: 70px; left: 12px; width: 200px; height: 140px; }
  .viewport-tr { top: 70px; right: 300px; width: 200px; height: 140px; }
  .viewport-bl { bottom: 16px; left: 12px; width: 200px; height: 140px; }
  .viewport-br { bottom: 16px; right: 300px; width: 200px; height: 140px; }
  .viewport-center { top: 50%; left: 50%; transform: translate(-50%,-50%); width: 320px; height: 200px; }
  
  /* Overlay dashboards */
  .dashboard {
    position: fixed; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
    padding: 12px 16px; z-index: 6;
  }
  .dashboard-top { top: 70px; left: 50%; transform: translateX(-50%); }
  .dashboard-bottom { bottom: 200px; left: 50%; transform: translateX(-50%); }
  .dashboard-right { top: 50%; right: 300px; transform: translateY(-50%); }
  .dashboard-center { top: 50%; left: 50%; transform: translate(-50%,-50%); }
  
  .dashboard h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 6px; }
  .gauge-row { display: flex; gap: 12px; }
  .gauge { text-align: center; }
  .gauge .val { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .gauge .lbl { font-size: 9px; color: #888; text-transform: uppercase; }
  
  /* Alarm notification */
  #alarm-notification {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    background: rgba(230,57,70,0.9); padding: 12px 24px; border-radius: 8px;
    font-weight: 700; z-index: 30; display: none;
    animation: pulse-red 1s ease-in-out infinite;
    cursor: pointer;
  }
  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 8px rgba(230,57,70,0.4); }
    50% { box-shadow: 0 0 24px rgba(230,57,70,0.8); }
  }
  
  /* Walk animation overlay */
  #walk-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; z-index: 25; opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  #walk-overlay.show { opacity: 1; }
  
  /* Instructions */
  #instructions {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: rgba(255,255,255,0.3);
    z-index: 5;
    text-align: center;
  }
  
  #debug-info {
    position: fixed; bottom: 40px; left: 12px;
    font-size: 11px; color: rgba(255,255,255,0.2);
    z-index: 5; font-family: monospace;
    display: none;
  }

  /* Responsive */
  @media (max-width: 768px) {
    #side-panel { width: 220px; }
    .viewport-tl, .viewport-tr, .viewport-bl, .viewport-br { width: 120px; height: 80px; }
    .viewport-tr { right: 240px; }
    .viewport-br { right: 240px; }
    .dashboard-right { right: 240px; }
    #compass button { padding: 4px 8px; font-size: 9px; }
    #room-title { font-size: 16px; padding: 8px 16px; }
  }
</style>
</head>
<body>
<div id="canvas-container"></div>

<div id="hud">
  <div id="room-title">Wheelhouse</div>
  
  <div id="compass">
    <button data-look="fore">↑ Fore</button>
    <button data-look="aft">↓ Aft</button>
    <button data-look="port">← Port</button>
    <button data-look="starboard">→ Starboard</button>
    <button data-look="up">Up</button>
    <button data-look="down">Down</button>
  </div>
  
  <div id="instructions">Drag to look around · Click adjacent rooms to walk · Warp any room from panel</div>
  <div id="debug-info">debug</div>
  
  <div id="alarm-notification"></div>
  <div id="walk-overlay"></div>
  
  <div id="toggle-panel" title="Toggle Room Panel">☰</div>
</div>

<div id="side-panel">

    <h3>📍 Current Room</h3>

  </div>
  
  <div class="panel-section">

  </div>
  
  <div class="panel-section">
    <h3>✨ Warp To (Teleport)</h3>
    <div id="warp-rooms"></div>
  </div>
  
  <div class="panel-section">
    <h3>📷 Cameras</h3>
    <div id="room-cameras"></div>
  </div>
  
  <div class="panel-section">
    <h3>📊 All Rooms</h3>
    <div id="all-rooms"></div>
  </div>
  
  <div class="panel-section">
    <h3>🚨 Trigger Alarm</h3>
    <div>
      <select id="alarm-room-select" style="background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:#eee; padding:6px 8px; border-radius:4px; width:100%; margin-bottom:6px;"></select>
      <button id="alarm-trigger" style="background:#c62828; color:#fff; border:none; padding:8px; border-radius:4px; cursor:pointer; width:100%; font-weight:600;">🚨 TRIGGER ALARM</button>
    </div>
  </div>
</div>

<script type="importmap">

// STATE
// =============================================
let currentRoomId = ROOMS_CONFIG.startRoom;
let targetRotation = { x: 0, y: 0 };
let isWalking = false;

// =============================================
// THREE.JS SETUP
// =============================================
const container = document.getElementById('canvas-container');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.left = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
container.appendChild(labelRenderer.domElement);

// Controls - first person with pointer lock feel
let isDragging = false;
let previousMouse = { x: 0, y: 0 };
let spherical = { theta: 0, phi: 0 };
let targetSpherical = { theta: 0, phi: 0 };

// Lighting
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x362915, 0.6);
scene.add(hemiLight);

// =============================================
// ROOM BUILDER
// =============================================
let currentRoomGroup = null;

function hexToThreeColor(hex) {
  const r = parseInt(hex.slice(1,3), 16) / 255;
  const g = parseInt(hex.slice(3,5), 16) / 255;
  const b = parseInt(hex.slice(5,7), 16) / 255;
  return new THREE.Color(r, g, b);
}

function buildRoom(roomId) {
  if (currentRoomGroup) {
    scene.remove(currentRoomGroup);
    // Dispose geometry and materials
    currentRoomGroup.traverse(child => {
      if (child.isMesh) {
        child.geometry.dispose();
        if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
        else child.material.dispose();
      }
    });
  }
  
  const room = ROOMS_CONFIG.rooms[roomId];
  if (!room) return;
  
  currentRoomGroup = new THREE.Group();
  const color = hexToThreeColor(room.color);
  
  // Room dimensions
  const w = 8, h = 3, d = 6;
  
  // Create room interior as 6 walls with different shades
  const wallMat = (shade) => new THREE.MeshStandardMaterial({
    color: color.clone().multiplyScalar(shade),
    roughness: 0.9,
    metalness: 0.1,
    side: THREE.BackSide
  });
  
  // Floor
  const floorGeo = new THREE.PlaneGeometry(w, d);
  const floorMat = new THREE.MeshStandardMaterial({
    color: color.clone().multiplyScalar(0.4),
    roughness: 1.0,
    metalness: 0,
    side: THREE.BackSide
  });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -h/2;
  currentRoomGroup.add(floor);
  
  // Ceiling
  const ceilMat = new THREE.MeshStandardMaterial({
    color: color.clone().multiplyScalar(0.6),
    roughness: 0.95,
    metalness: 0,
    side: THREE.BackSide
  });
  const ceil = new THREE.Mesh(floorGeo, ceilMat);
  ceil.rotation.x = Math.PI / 2;
  ceil.position.y = h/2;
  currentRoomGroup.add(ceil);
  
  // Walls
  const walls = [
    { name: 'fore', geo: new THREE.PlaneGeometry(w, h), pos: [0, 0, -d/2], shade: 0.85 },
    { name: 'aft', geo: new THREE.PlaneGeometry(w, h), pos: [0, 0, d/2], shade: 0.75 },
    { name: 'port', geo: new THREE.PlaneGeometry(d, h), pos: [-w/2, 0, 0], shade: 0.65 },
    { name: 'starboard', geo: new THREE.PlaneGeometry(d, h), pos: [w/2, 0, 0], shade: 0.7 },
  ];
  
  const wallRots = {
    'fore': 0,
    'aft': Math.PI,
    'port': Math.PI / 2,
    'starboard': -Math.PI / 2,
  };
  
  walls.forEach(wall => {
    const mat = wallMat(wall.shade);
    const mesh = new THREE.Mesh(wall.geo, mat);
    mesh.position.set(wall.pos[0], wall.pos[1], wall.pos[2]);
    mesh.rotation.y = wallRots[wall.name];
    mesh.userData.wallName = wall.name;
    currentRoomGroup.add(mesh);
  });
  
  // Grid lines on floor
  const gridHelper = new THREE.GridHelper(Math.max(w, d), 12, 0xffffff, 0xffffff);
  gridHelper.position.y = -h/2 + 0.01;
  gridHelper.material.transparent = true;
  gridHelper.material.opacity = 0.1;
  currentRoomGroup.add(gridHelper);
  
  scene.add(currentRoomGroup);
  
  // Add direction labels
  addDirectionLabels(room);
  
  // Add adjacent room indicators (glowing doorways)
  addAdjacentIndicators(room);
}

function addDirectionLabels(room) {
  const w = 8, h = 3, d = 6;
  const dirPositions = {
    'fore': [0, 0, -d/2 - 0.05],
    'aft': [0, 0, d/2 + 0.05],
    'port': [-w/2 - 0.05, 0, 0],
    'starboard': [w/2 + 0.05, 0, 0],
    'up': [0, h/2 + 0.05, 0],
    'down': [0, -h/2 - 0.05, 0],
  };
  
  Object.entries(room.directions).forEach(([dir, info]) => {
    const pos = dirPositions[dir];
    if (!pos) return;
    
    const div = document.createElement('div');
    div.textContent = `${dir.toUpperCase()}: ${info.label}`;
    div.style.color = info.camera ? '#64ffda' : '#aab';
    div.style.fontSize = '12px';
    div.style.fontWeight = '600';
    div.style.background = 'rgba(0,0,0,0.6)';
    div.style.padding = '4px 8px';
    div.style.borderRadius = '4px';
    div.style.border = info.camera ? '1px solid rgba(100,255,218,0.3)' : '1px solid rgba(255,255,255,0.1)';
    div.style.backdropFilter = 'blur(4px)';
    div.style.textShadow = '0 1px 3px rgba(0,0,0,0.5)';
    
    const label = new CSS2DObject(div);
    label.position.set(pos[0], pos[1], pos[2]);
    currentRoomGroup.add(label);
  });
}

function addAdjacentIndicators(room) {
  const w = 8, h = 3, d = 6;
  
  // If there's an adjacent room to the fore, show a door indicator
  const adjFore = ['foredeck', 'galley', 'crow_nest', 'wheelhouse', 'wheelhouse_roof', 'engine_room'];
  
  // Fore door
  if (room.adjacent.length > 0) {
    const doorGeo = new THREE.PlaneGeometry(1.5, 2.5);
    const doorMat = new THREE.MeshStandardMaterial({
      color: 0x88ddff,
      transparent: true,
      opacity: 0.3,
      emissive: 0x4488aa,
      emissiveIntensity: 0.3,
      side: THREE.DoubleSide
    });
    
    // Add glow door on forward wall if applicable
    if (room.adjacent.includes('foredeck') || room.adjacent.includes('galley')) {
      const door = new THREE.Mesh(doorGeo, doorMat);
      door.position.set(0, 0, -d/2 - 0.02);
      currentRoomGroup.add(door);
    }
    
    // Aft door
    if (room.adjacent.includes('engine_room') || room.adjacent.includes('aft_cockpit') || room.adjacent.includes('wheelhouse')) {
      const door2 = new THREE.Mesh(doorGeo, doorMat.clone());
      door2.position.set(0, 0, d/2 + 0.02);
      door2.rotation.y = Math.PI;
      currentRoomGroup.add(door2);
    }
    
    // Port door
    if (room.adjacent.some(a => a === 'galley' || a === 'crow_nest')) {
      const door3 = new THREE.Mesh(doorGeo, doorMat.clone());
      door3.position.set(-w/2 - 0.02, 0, 0);
      door3.rotation.y = Math.PI / 2;
      currentRoomGroup.add(door3);
    }
    
    // Starboard door
    if (room.adjacent.includes('wheelhouse_roof') || room.adjacent.includes('engine_room')) {
      const door4 = new THREE.Mesh(doorGeo, doorMat.clone());
      door4.position.set(w/2 + 0.02, 0, 0);
      door4.rotation.y = -Math.PI / 2;
      currentRoomGroup.add(door4);
    }
  }
}

// =============================================
// RAYCASTER for room navigation
// =============================================
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  if (isDragging) return;
  
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  
  raycaster.setFromCamera(pointer, camera);
  
  // Check if clicking on a wall -> walk to adjacent room
  const room = ROOMS_CONFIG.rooms[currentRoomId];
  if (!room) return;
  
  const intersects = raycaster.intersectObjects(currentRoomGroup.children);
  
  for (const hit of intersects) {
    if (hit.object.userData && hit.object.userData.wallName) {
      const wallName = hit.object.userData.wallName;
      const adjMap = {
        'fore': room.adjacent[0],
        'aft': room.adjacent[Math.min(1, room.adjacent.length - 1)],
      };
      
      // Simple heuristic: fore/aft walls lead to first/second adjacent rooms
      if (wallName === 'fore' && room.adjacent.length > 0) {
        navigateTo(room.adjacent[0]);
        return;
      }
      if (wallName === 'aft' && room.adjacent.length > 1) {
        navigateTo(room.adjacent[1]);
        return;
      }
      if (wallName === 'port' && room.adjacent.length > 2) {
        navigateTo(room.adjacent[2]);
        return;
      }
      if (wallName === 'starboard' && room.adjacent.length > 3) {
        navigateTo(room.adjacent[3]);
        return;
      }
      // Just go to first adjacent
      if (room.adjacent.length > 0) {
        navigateTo(room.adjacent[0]);
        return;
      }
    }
  }
});

// =============================================
// NAVIGATION
// =============================================
function navigateTo(roomId) {
  if (isWalking || !ROOMS_CONFIG.rooms[roomId]) return;
  if (roomId === currentRoomId) return;
  
  isWalking = true;
  const overlay = document.getElementById('walk-overlay');
  overlay.classList.add('show');
  
  setTimeout(() => {
    const prevRoom = currentRoomId;
    currentRoomId = roomId;
    buildRoom(roomId);
    updateUI();
    overlay.classList.remove('show');
    isWalking = false;
  }, 250);
}

function warpTo(roomId) {
  if (!ROOMS_CONFIG.rooms[roomId] || roomId === currentRoomId) return;
  
  isWalking = true;
  const overlay = document.getElementById('walk-overlay');
  overlay.classList.add('show');
  
  // Flash notification
  const title = document.getElementById('room-title');
  title.textContent = `⚡ Warping to ${ROOMS_CONFIG.rooms[roomId].name}...`;
  
  setTimeout(() => {
    currentRoomId = roomId;
    buildRoom(roomId);
    updateUI();
    overlay.classList.remove('show');
    isWalking = false;
    
    // Reset rotation
    targetSpherical.theta = 0;
    targetSpherical.phi = 0;
    spherical.theta = 0;
    spherical.phi = 0;
  }, 200);
}

// =============================================
// LOOK DIRECTION
// =============================================
function lookDirection(dir) {
  const targets = {
    'fore': { theta: 0, phi: 0 },
    'aft': { theta: Math.PI, phi: 0 },
    'port': { theta: Math.PI / 2, phi: 0 },
    'starboard': { theta: -Math.PI / 2, phi: 0 },
    'up': { theta: 0, phi: -Math.PI / 3 },
    'down': { theta: 0, phi: Math.PI / 4 },
  };
  
  const t = targets[dir];
  if (t) {
    targetSpherical.theta = t.theta;
    targetSpherical.phi = t.phi;
    
    // Highlight button
    document.querySelectorAll('#compass button').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`#compass button[data-look="${dir}"]`);
    if (btn) btn.classList.add('active');
  }
}

// Setup compass buttons
document.querySelectorAll('#compass button').forEach(btn => {
  btn.addEventListener('click', () => lookDirection(btn.dataset.look));
});

// =============================================
// MOUSE DRAG
// =============================================
renderer.domElement.addEventListener('mousedown', (e) => {
  isDragging = false;
  previousMouse.x = e.clientX;
  previousMouse.y = e.clientY;
});

renderer.domElement.addEventListener('mousemove', (e) => {
  if (e.buttons !== 1) return;
  
  const dx = e.clientX - previousMouse.x;
  const dy = e.clientY - previousMouse.y;
  
  if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
    isDragging = true;
  }
  
  targetSpherical.theta -= dx * 0.005;
  targetSpherical.phi -= dy * 0.005;
  targetSpherical.phi = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, targetSpherical.phi));
  
  previousMouse.x = e.clientX;
  previousMouse.y = e.clientY;
  
  document.querySelectorAll('#compass button').forEach(b => b.classList.remove('active'));
});

// Touch support
let touchStart = null;
renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: true });

renderer.domElement.addEventListener('touchmove', (e) => {
  if (e.touches.length === 1 && touchStart) {
    const dx = e.touches[0].clientX - touchStart.x;
    const dy = e.touches[0].clientY - touchStart.y;
    
    targetSpherical.theta -= dx * 0.005;
    targetSpherical.phi -= dy * 0.005;
    targetSpherical.phi = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, targetSpherical.phi));
    
    touchStart.x = e.touches[0].clientX;
    touchStart.y = e.touches[0].clientY;
  }
}, { passive: true });

renderer.domElement.addEventListener('touchend', () => {
  touchStart = null;
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  const keyMap = {
    'w': 'fore', 'ArrowUp': 'fore',
    's': 'aft', 'ArrowDown': 'aft',
    'a': 'port', 'ArrowLeft': 'port',
    'd': 'starboard', 'ArrowRight': 'starboard',
    'q': 'up',
    'e': 'down',
  };
  
  if (keyMap[e.key]) {
    lookDirection(keyMap[e.key]);
    e.preventDefault();
  }
  
  // Number keys for warp
  const rooms = Object.keys(ROOMS_CONFIG.rooms);
  const num = parseInt(e.key);
  if (num >= 1 && num <= rooms.length) {
    const target = rooms[num - 1];
    if (target) warpTo(target);
  }
});

function updateUI() {
  const room = ROOMS_CONFIG.rooms[currentRoomId];
  if (!room) return;
  
  // Title
  const title = document.getElementById('room-title');
  const typeTag = room.type === 'virtual' ? '🖥️' : room.type === 'composite' ? '🧩' : '🚪';
  title.textContent = `${typeTag} ${room.name}`;
  
  // Room info
  document.getElementById('current-room-info').textContent = 
    `${room.description} · ${room.type} room`;
  
  // Adjacent rooms
  const adjDiv = document.getElementById('adjacent-rooms');
  adjDiv.innerHTML = '';
  if (room.adjacent.length === 0) {
    adjDiv.innerHTML = '<span style="color:#666;font-size:11px;">No walkable exits</span>';
  } else {
    room.adjacent.forEach(id => {
      const r = ROOMS_CONFIG.rooms[id];
      if (r) {
        const el = document.createElement('span');
        el.className = 'room-link';
        el.textContent = `🚶 ${r.name}`;
        el.addEventListener('click', () => navigateTo(id));
        adjDiv.appendChild(el);
      }
    });
  }
  
  // Warp rooms
  const warpDiv = document.getElementById('warp-rooms');
  warpDiv.innerHTML = '';
  const warpTargets = [...new Set([...(room.warp || []), ...Object.keys(ROOMS_CONFIG.rooms).filter(id => id !== currentRoomId)])];
  warpTargets.forEach(id => {
    const r = ROOMS_CONFIG.rooms[id];
    if (r) {
      const el = document.createElement('span');
      el.className = 'room-link warp';
      el.textContent = `⚡ ${r.name}`;
      el.addEventListener('click', () => warpTo(id));
      warpDiv.appendChild(el);
    }
  });
  
  // Cameras
  const camDiv = document.getElementById('room-cameras');
  camDiv.innerHTML = '';
  if (room.cameras && room.cameras.length > 0) {
    room.cameras.forEach(cam => {
      const el = document.createElement('div');
      el.className = 'cam-entry';
      el.innerHTML = `<span class="label">📷 ${cam.label}</span><span class="mode">${cam.type} · mode: ${cam.mode}${cam.interactive ? ' · 🔄 interactive' : ''}</span>`;
      camDiv.appendChild(el);
    });
  } else {
    camDiv.innerHTML = '<span style="color:#666;font-size:11px;">No cameras in this room</span>';
  }
  
  // All rooms list
  const allDiv = document.getElementById('all-rooms');
  allDiv.innerHTML = '';
  Object.entries(ROOMS_CONFIG.rooms).forEach(([id, r]) => {
    const el = document.createElement('span');
    el.className = id === currentRoomId ? 'room-link' : 'room-link warp';
    el.style.borderColor = id === currentRoomId ? 'rgba(100,255,218,0.5)' : undefined;
    el.textContent = id === currentRoomId ? `📍 ${r.name}` : r.name;
    el.addEventListener('click', () => warpTo(id));
    allDiv.appendChild(el);
  });
  
  // Alarm room select
  const alarmSelect = document.getElementById('alarm-room-select');
  alarmSelect.innerHTML = '';
  Object.entries(ROOMS_CONFIG.rooms).forEach(([id, r]) => {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = r.name;
    alarmSelect.appendChild(opt);
  });
  
  // Update camera viewports
  updateCameraViewports(room);
  
  // Update dashboards
  updateDashboards(room);
}

function updateCameraViewports(room) {
  // Hide all viewports
  document.querySelectorAll('.cam-viewport').forEach(v => v.classList.remove('visible'));
  
  if (!room.cameras) return;
  
  // Show up to 4 camera viewports in corners
  const positions = ['tl', 'tr', 'bl', 'br'];
  room.cameras.slice(0, 4).forEach((cam, i) => {
    const vp = document.getElementById(`viewport-${positions[i]}`);
    if (vp) {
      vp.classList.add('visible');
      const nameEl = vp.querySelector('.cam-name');
      if (nameEl) nameEl.textContent = cam.label;
    }
  });
}

function updateDashboards(room) {
  // Hide all dashboards
  document.querySelectorAll('.dashboard').forEach(d => d.style.display = 'none');
  
  if (!room.overlays) return;
  
  room.overlays.forEach(overlay => {
    if (overlay.type === 'dashboard' || overlay.type === 'gauges') {
      const dashId = `dash-${overlay.position}`;
      const dash = document.getElementById(dashId);
      if (dash) {
        dash.style.display = 'block';
        // Update gauge values - randomize for demo
        const gauges = dash.querySelectorAll('.gauge .val');
        gauges.forEach(g => {
          const base = parseInt(g.dataset.base) || 50;
          const val = Math.round(base + (Math.random() - 0.5) * 20);
          g.textContent = val;
          // Color based on value
          if (val > 90) g.style.color = '#ff5252';
          else if (val > 75) g.style.color = '#ffab40';
          else g.style.color = '#64ffda';
        });
      }
    }
    
    if (overlay.type === 'nav' && overlay.position === 'center') {
      const dash = document.getElementById('dash-center');
      if (dash) {
        dash.style.display = 'block';
      }
    }
  });
}

function triggerAlarm(roomId) {
  const room = ROOMS_CONFIG.rooms[roomId];

  const notif = document.getElementById('alarm-notification');
  notif.textContent = `🚨 ALARM: ${room.name} — Click to warp there`;
  notif.style.display = 'block';

  // Click to warp
  notif.onclick = () => {
    notif.style.display = 'none';

  document.querySelectorAll('#all-rooms .room-link').forEach(el => {
    el.style.animation = '';
    if (el.textContent.includes(room.name)) {
      el.style.animation = 'pulse-red 0.5s ease-in-out 4';

  });
}

// =============================================
// ANIMATION LOOP
// =============================================
function animate() {
  requestAnimationFrame(animate);
  
  // Smooth rotation
  spherical.theta += (targetSpherical.theta - spherical.theta) * 0.12;
  spherical.phi += (targetSpherical.phi - spherical.phi) * 0.12;
  
  // Update camera direction
  const radius = 0.001; // effectively at origin, rotating the view
  camera.position.x = radius * Math.cos(spherical.phi) * Math.sin(spherical.theta);
  camera.position.y = 1.6 + radius * Math.sin(spherical.phi);
  camera.position.z = radius * Math.cos(spherical.phi) * Math.cos(spherical.theta);
  camera.lookAt(0, 1.6, 0);
  
  // Slowly rotate direction labels to face camera
  if (currentRoomGroup) {
    currentRoomGroup.children.forEach(child => {
      if (child.isCSS2DObject) {
        child.lookAt(camera.position);
      }
    });
  }
  
  // Gauge animation - every 60 frames, update dashboards
  if (Math.random() < 0.01) {
    const room = ROOMS_CONFIG.rooms[currentRoomId];
    if (room) updateDashboards(room);
  }
  
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
